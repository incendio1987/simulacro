<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Historia</title>
<style>
:root {
  --bg: #0a0a0a;
  --text: #f0f0f0;
  --accent: #e0c97f;
  --font: 'Arial Black', Arial, sans-serif;
  --radius: 12px;
  --transition: 0.35s;
  --panel-bg: #1a1a1a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
}
#app { display:flex; flex-direction:column; min-height:100dvh; position:relative; }
#entry-display {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px 20px 120px; text-align:center;
}
#choices-zone {
  display:flex; gap:10px; padding:10px 16px 30px;
  justify-content:center; flex-wrap:wrap;
  position:fixed; bottom:50px; left:0; right:0; z-index:5;
}
#menu-toggle {
  position:fixed; top:16px; left:16px; z-index:100;
  width:44px; height:44px; background:var(--panel-bg);
  border:1px solid rgba(255,255,255,0.1); border-radius:10px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
#menu-toggle:active { transform:scale(0.9); }
#menu-toggle svg { width:20px; height:20px; fill:var(--text); }
#side-panel {
  position:fixed; top:0; left:0; bottom:0; width:260px;
  background:var(--panel-bg); z-index:99;
  transform:translateX(-100%); transition:transform var(--transition) ease;
  display:flex; flex-direction:column; padding:70px 16px 20px; gap:6px; overflow-y:auto;
}
#side-panel.open { transform:translateX(0); }
#panel-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  z-index:98; opacity:0; pointer-events:none;
  transition:opacity var(--transition);
}
#panel-overlay.open { opacity:1; pointer-events:all; }
.panel-item {
  display:flex; align-items:center; gap:12px;
  padding:14px 12px; background:rgba(255,255,255,0.05);
  border-radius:10px; cursor:pointer; font-size:12px; letter-spacing:1px;
}
.panel-item:active { background:rgba(255,255,255,0.12); }
.panel-item svg { width:20px; height:20px; fill:var(--accent); flex-shrink:0; }

#diary-screen {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:200; display:none; flex-direction:column;
  align-items:center; justify-content:center; padding:30px 20px;
}
#diary-screen.active { display:flex; }
#diary-time { font-size:14px; color:var(--accent); margin-bottom:16px; }
#diary-input {
  width:100%; max-width:340px; height:180px;
  background:var(--panel-bg); border:1px solid rgba(255,255,255,0.15);
  border-radius:var(--radius); color:var(--text);
  font-family:var(--font); font-size:13px; padding:14px;
  resize:none; text-transform:none;
}
#diary-ok {
  margin-top:16px; padding:12px 40px;
  background:var(--accent); color:var(--bg); border:none;
  border-radius:var(--radius); font-family:var(--font);
  font-size:13px; text-transform:uppercase; cursor:pointer;
}
#export-btn {
  position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
  z-index:50; width:40px; height:40px;
  background:var(--panel-bg); border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer;
}
#export-btn svg { width:18px; height:18px; fill:var(--accent); }
#toast {
  position:fixed; bottom:60px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--accent); color:var(--bg);
  padding:10px 20px; border-radius:8px; font-size:11px;
  opacity:0; transition:all 0.4s; z-index:300;
  pointer-events:none; text-align:center; max-width:280px;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.entry-text { font-size:22px; line-height:1.4; max-width:340px; letter-spacing:1px; }
.entry-image img { max-width:100%; max-height:60vh; border-radius:var(--radius); object-fit:contain; }
.fade-in { animation:fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
#tm-screen {
  position:fixed; inset:0; background:rgba(0,0,0,0.92);
  z-index:200; display:none; flex-direction:column;
  align-items:center; justify-content:center; padding:30px 20px;
}
#tm-screen.active { display:flex; }
.tm-ch-btn {
  width:100%; padding:16px; margin-bottom:8px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius); color:var(--text);
  font-family:var(--font); font-size:13px; text-transform:uppercase;
  cursor:pointer; text-align:left; letter-spacing:1px;
}
.tm-ch-btn:active { background:rgba(255,255,255,0.12); }
</style>
</head>
<body>
<div id="app">
  <div id="menu-toggle" onclick="togglePanel()">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </div>
  <div id="panel-overlay" onclick="togglePanel()"></div>
  <div id="side-panel">
    <div class="panel-item" onclick="openDiary()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h6v6h6v10H6z"/></svg>
      <span>Diario</span>
    </div>
    <div class="panel-item" onclick="downloadImg()">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      <span>Guardar imagen</span>
    </div>
    <div class="panel-item" onclick="openTimeMachine()">
      <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
      <span>Time Machine</span>
    </div>
    <div class="panel-item" onclick="resetStory()">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      <span>Reiniciar</span>
    </div>
  </div>
  <div id="entry-display"></div>
  <div id="choices-zone"></div>
  <div id="export-btn" onclick="exportData()">
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
  </div>
  <div id="diary-screen">
    <div id="diary-time"></div>
    <textarea id="diary-input" placeholder="Escribe aquí..."></textarea>
    <button id="diary-ok" onclick="saveDiary()">OK</button>
  </div>
  <!-- TIME MACHINE -->
  <div id="tm-screen">
    <div id="tm-pass-view">
      <p style="color:var(--accent);font-size:14px;margin-bottom:16px;letter-spacing:2px;">🕰 Time Machine</p>
      <input type="password" id="tm-pass-input" placeholder="Contraseña" style="
        width:100%;max-width:260px;padding:12px;background:var(--panel-bg);
        border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);
        color:var(--text);font-family:var(--font);font-size:13px;text-align:center;
        text-transform:none;margin-bottom:12px;">
      <button onclick="checkTMPass()" style="
        padding:12px 40px;background:var(--accent);color:var(--bg);border:none;
        border-radius:var(--radius);font-family:var(--font);font-size:13px;
        text-transform:uppercase;cursor:pointer;">Entrar</button>
      <p id="tm-error" style="color:var(--danger);font-size:10px;margin-top:10px;display:none;">Contraseña incorrecta</p>
    </div>
    <div id="tm-chapters-view" style="display:none;">
      <p style="color:var(--accent);font-size:14px;margin-bottom:16px;letter-spacing:2px;">Elige capítulo</p>
      <div id="tm-ch-list" style="width:100%;max-width:300px;max-height:60vh;overflow-y:auto;"></div>
    </div>
    <button onclick="closeTM()" style="
      position:absolute;top:20px;right:20px;width:36px;height:36px;
      background:rgba(255,255,255,0.1);border:none;border-radius:8px;
      color:var(--text);font-size:18px;cursor:pointer;">✕</button>
  </div>
  <div id="toast"></div>
</div>

<script>
/* ==============================================================
   DATA
   ============================================================== */
let STORY = null;
let STATE = { currentEntry:null, history:[], diary:[], startedAt:null };

function loadState() {
  const s = localStorage.getItem('story_state');
  if (s) try { STATE = JSON.parse(s); } catch(e) {}
  if (!STATE.history) STATE.history = [];
  if (!STATE.diary) STATE.diary = [];
  if (!STATE.startedAt) STATE.startedAt = new Date().toISOString();
}
function saveState() { localStorage.setItem('story_state', JSON.stringify(STATE)); }

async function init() {
  console.log('[HISTORIA] Cargando story.json...');

  let loaded = false;
  try {
    const res = await fetch('story.json?t=' + Date.now());
    console.log('[HISTORIA] fetch status:', res.status);
    if (res.ok) {
      const text = await res.text();
      console.log('[HISTORIA] JSON length:', text.length);
      STORY = JSON.parse(text);
      loaded = true;
    }
  } catch(e) {
    console.error('[HISTORIA] fetch error:', e);
  }

  if (!loaded || !STORY || !STORY.entries) {
    document.getElementById('entry-display').innerHTML =
      '<div class="entry-text fade-in" style="font-size:16px;">No se pudo cargar story.json<br><br><span style="font-size:11px;opacity:0.5;">Verifica que story.json está en la misma carpeta que index.html en GitHub Pages</span></div>';
    return;
  }

  const entryCount = Object.keys(STORY.entries).length;
  console.log('[HISTORIA] Entries:', entryCount);
  console.log('[HISTORIA] meta.start:', STORY.meta?.start);
  console.log('[HISTORIA] Entry IDs:', Object.keys(STORY.entries).join(', '));

  // Determine start
  const startId = STORY.meta?.start || Object.keys(STORY.entries)[0] || 'start';
  console.log('[HISTORIA] Using start:', startId);

  // Load saved state
  loadState();

  // If saved currentEntry doesn't exist in this story, reset to start
  if (!STATE.currentEntry || !STORY.entries[STATE.currentEntry]) {
    console.log('[HISTORIA] Resetting to start. Old currentEntry was:', STATE.currentEntry);
    STATE.currentEntry = startId;
    STATE.startedAt = new Date().toISOString();
    saveState();
  }

  console.log('[HISTORIA] Rendering:', STATE.currentEntry);
  renderEntry(STATE.currentEntry);
}

/* ==============================================================
   RENDERERS
   ============================================================== */
const RENDERERS = {};

RENDERERS.text = function(data) {
  return `<div class="entry-text fade-in" style="color:${data.color||'var(--text)'};font-size:${data.size||'22px'};">${data.text||''}</div>`;
};

RENDERERS.image = function(data, entryId, choices) {
  let h = '<div class="fade-in" style="position:relative;width:100%;max-width:400px;margin:0 auto;min-height:200px;">';
  var imgs = data.images || [];
  if (!imgs.length && data.src) imgs = [{src:data.src}];
  var imgChoiceIdx=0;
  imgs.forEach(function(img, i) {
    var rot = img.rot ? 'rotate('+img.rot+'deg)' : '';
    var x = img.x != null ? img.x : 50;
    var y = img.y != null ? img.y : 50;
    var w = img.w || 100;
    var click = '';
    if(img.isChoice && choices){
      // Find matching choice by _choiceType=image
      var ci = choices.findIndex(function(c,ci2){return c._choiceType==='image' && ci2>=imgChoiceIdx;});
      if(ci>=0 && choices[ci].next){
        var sl=(choices[ci].label||'').replace(/'/g,"\\'");
        click = 'onclick="choose(\''+entryId+'\',\''+choices[ci].next+'\',\''+sl+'\','+ci+')" style="cursor:pointer;';
        imgChoiceIdx=ci+1;
      }
    }
    if(click){
      h += '<img src="'+img.src+'" '+click+'position:absolute;left:'+x+'%;top:'+y+'%;width:'+w+'%;transform:translate(-50%,-50%) '+rot+';">';
    } else {
      h += '<img src="'+img.src+'" style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+w+'%;transform:translate(-50%,-50%) '+rot+';">';
    }
  });
  var blockChoiceIdx=0;
  if (data.blocks && data.blocks.length) {
    data.blocks.forEach(function(b, i) {
      var fs = b.style==='italic'?'font-style:italic;':'';
      var fw = b.style==='bold'?'font-weight:900;':'font-weight:normal;';
      var shadow = b.shadow?'text-shadow:0 2px 6px rgba(0,0,0,0.8);':'';
      var tt = b.uppercase?'text-transform:uppercase;':'text-transform:none;';
      var rot = b.rot?'rotate('+b.rot+'deg)':'';
      var border = b.isChoice&&b.choiceBorder?'border:1px solid '+b.choiceBorder+';padding:4px 10px;border-radius:6px;':'';
      var click = '';
      if(b.isChoice && choices){
        var ci = choices.findIndex(function(c,ci2){return c._choiceType==='block' && ci2>=blockChoiceIdx;});
        if(ci>=0 && choices[ci].next){
          var sl=(choices[ci].label||'').replace(/'/g,"\\'");
          click = 'onclick="choose(\''+entryId+'\',\''+choices[ci].next+'\',\''+sl+'\','+ci+')"';
          border += 'cursor:pointer;';
          blockChoiceIdx=ci+1;
        }
      }
      h += '<div '+click+' style="position:absolute;left:'+b.x+'%;top:'+b.y+'%;transform:translate(-50%,-50%) '+rot+';color:'+(b.color||'#fff')+';font-size:'+(b.size||'14px')+';'+fs+fw+shadow+tt+'font-family:'+(b.font||'Arial Black')+',sans-serif;text-align:center;max-width:80%;'+border+'">'+(b.text||'')+'</div>';
    });
  }
  h += '</div>';
  return h;
};

RENDERERS.richtext = function(data, entryId, choices) {
  let h = '<div class="fade-in" style="position:relative;width:100%;height:100%;min-height:300px;">';
  var blockChoiceIdx=0;
  if (data.blocks && data.blocks.length) {
    data.blocks.forEach(function(b, i) {
      var fs = b.style==='italic'?'font-style:italic;':'';
      var fw = b.style==='bold'?'font-weight:900;':'font-weight:normal;';
      var shadow = b.shadow?'text-shadow:0 1px 4px rgba(0,0,0,0.5);':'';
      var tt = b.uppercase?'text-transform:uppercase;':'text-transform:none;';
      var rot = b.rot?'rotate('+b.rot+'deg)':'';
      var border = b.isChoice&&b.choiceBorder?'border:1px solid '+b.choiceBorder+';padding:4px 10px;border-radius:6px;':'';
      var click = '';
      if(b.isChoice && choices){
        var ci = choices.findIndex(function(c,ci2){return c._choiceType==='block' && ci2>=blockChoiceIdx;});
        if(ci>=0 && choices[ci].next){
          var sl=(choices[ci].label||'').replace(/'/g,"\\'");
          click = 'onclick="choose(\''+entryId+'\',\''+choices[ci].next+'\',\''+sl+'\','+ci+')"';
          border += 'cursor:pointer;';
          blockChoiceIdx=ci+1;
        }
      }
      h += '<div '+click+' style="position:absolute;left:'+b.x+'%;top:'+b.y+'%;transform:translate(-50%,-50%) '+rot+';color:'+(b.color||'#f0f0f0')+';font-size:'+(b.size||'22px')+';'+fs+fw+shadow+tt+'font-family:'+(b.font||'Arial Black')+',sans-serif;text-align:center;max-width:85%;'+border+'">'+(b.text||'')+'</div>';
    });
  }
  h += '</div>';
  return h;
};

RENDERERS.thermo = function(data, entryId, choices) {
  let h = '<div class="fade-in" style="position:relative;width:100%;min-height:300px;">';
  // Image if present
  var imgs = data.images || [];
  if (!imgs.length && data.src) imgs = [{src:data.src}];
  imgs.forEach(function(img) {
    var rot = img.rot ? 'rotate('+img.rot+'deg)' : '';
    var x = img.x != null ? img.x : 50;
    var y = img.y != null ? img.y : 50;
    var w = img.w || 80;
    h += '<img src="'+img.src+'" style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+w+'%;transform:translate(-50%,-50%) '+rot+';">';
  });
  // Text blocks
  if (data.blocks && data.blocks.length) {
    data.blocks.forEach(function(b) {
      var fs = b.style==='italic'?'font-style:italic;':'';
      var fw = b.style==='bold'?'font-weight:900;':'font-weight:normal;';
      var shadow = b.shadow?'text-shadow:0 1px 4px rgba(0,0,0,0.6);':'';
      var tt = b.uppercase?'text-transform:uppercase;':'text-transform:none;';
      var rot = b.rot?'rotate('+b.rot+'deg)':'';
      h += '<div style="position:absolute;left:'+b.x+'%;top:'+b.y+'%;transform:translate(-50%,-50%) '+rot+';color:'+(b.color||'#f0f0f0')+';font-size:'+(b.size||'18px')+';'+fs+fw+shadow+tt+'font-family:'+(b.font||'Arial Black')+',sans-serif;text-align:center;max-width:85%;">'+(b.text||'')+'</div>';
    });
  }
  h += '</div>';
  return h;
};

RENDERERS.html = function(data) {
  return `<div class="fade-in">${data.content||''}</div>`;
};

/* ==============================================================
   RENDER
   ============================================================== */
function renderEntry(entryId) {
  const entry = STORY.entries[entryId];
  if (!entry) {
    document.getElementById('entry-display').innerHTML =
      `<div class="entry-text fade-in">FIN<br><br><span style="font-size:10px;opacity:0.3;">Entrada "${entryId}" no encontrada</span></div>`;
    document.getElementById('choices-zone').innerHTML = '';
    return;
  }

  document.body.style.background = entry.data?.bg || 'var(--bg)';

  const renderer = RENDERERS[entry.type];
  document.getElementById('entry-display').innerHTML = renderer
    ? renderer(entry.data || {}, entryId, entry.choices||[])
    : `<div class="entry-text fade-in">${JSON.stringify(entry.data)}</div>`;

  // Separate choice types
  const cz = document.getElementById('choices-zone');
  const buttonChoices = (entry.choices||[]).filter(c => !c._choiceType);
  const thermoChoices = (entry.choices||[]).filter(c => c._choiceType==='thermo');

  let czHTML = '';

  // THERMO: read labels from data, all buttons go to same next
  if (thermoChoices.length > 0) {
    const thColor = entry.data?.thColor || '#e0c97f';
    const thermoNext = thermoChoices[0].next;
    const labels = (entry.data?.thLabels || '1,2,3,4,5').split(',').map(s => s.trim());
    const origIdx = entry.choices.indexOf(thermoChoices[0]);
    czHTML += labels.map((lbl, i) => {
      const score = i + 1;
      const sl = lbl.replace(/'/g, "\\'");
      return `<button onclick="chooseThermo('${entryId}','${thermoNext}','${sl}',${origIdx},${score})" style="
        width:46px;height:46px;border:1.5px solid ${thColor};color:${thColor};
        background:transparent;border-radius:50%;font-family:var(--font);
        font-size:16px;cursor:pointer;display:flex;align-items:center;
        justify-content:center;
      ">${lbl}</button>`;
    }).join('');
  }

  // REGULAR buttons
  if (buttonChoices.length > 0) {
    const bc = entry.choiceBorder || '#e0c97f';
    const tc = entry.choiceColor || '#e0c97f';
    czHTML += buttonChoices.map((c, i) => {
      const origIdx = entry.choices.indexOf(c);
      const sl = (c.label||'').replace(/'/g,"\\'");
      return `<button onclick="choose('${entryId}','${c.next}','${sl}',${origIdx})" style="
        flex:1;min-width:100px;max-width:200px;padding:14px 10px;
        background:transparent;color:${tc};border:1.5px solid ${bc};
        border-radius:var(--radius);font-family:var(--font);font-size:13px;
        text-transform:uppercase;cursor:pointer;
      ">${c.label||'...'}</button>`;
    }).join('');
  }

  cz.innerHTML = czHTML;

  STATE.currentEntry = entryId;
  saveState();
}

function choose(fromId, nextId, label, idx) {
  const fe = STORY.entries[fromId];
  STATE.history.push({
    from:fromId, chose:label, choiceIndex:idx, next:nextId,
    chapter: fe?.chapter||'', timestamp: new Date().toISOString()
  });
  saveState();
  renderEntry(nextId);
}

function chooseThermo(fromId, nextId, label, idx, score) {
  const fe = STORY.entries[fromId];
  STATE.history.push({
    from:fromId, chose:label, choiceIndex:idx, next:nextId,
    chapter: fe?.chapter||'', timestamp: new Date().toISOString(),
    thermoScore: score
  });
  saveState();
  renderEntry(nextId);
}

/* ==============================================================
   PANEL / DIARY / EXPORT / RESET
   ============================================================== */
function togglePanel() {
  document.getElementById('side-panel').classList.toggle('open');
  document.getElementById('panel-overlay').classList.toggle('open');
}
function openDiary() {
  togglePanel();
  const now = new Date();
  document.getElementById('diary-time').textContent =
    now.toLocaleDateString('es-ES')+' · '+now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('diary-input').value = '';
  document.getElementById('diary-screen').classList.add('active');
}
function saveDiary() {
  const text = document.getElementById('diary-input').value.trim();
  if (text) { STATE.diary.push({text,timestamp:new Date().toISOString(),atEntry:STATE.currentEntry}); saveState(); }
  document.getElementById('diary-screen').classList.remove('active');
  showToast('Guardado ✓');
}
function downloadImg() {
  togglePanel();
  const img = document.querySelector('#entry-display img');
  if (img) { const a=document.createElement('a');a.href=img.src;a.download='imagen.png';a.click();showToast('Descargando...'); }
  else showToast('No hay imagen');
}
function resetStory() {
  togglePanel();
  if (!confirm('¿Reiniciar historia?')) return;
  localStorage.removeItem('story_state');
  STATE={currentEntry:null,history:[],diary:[],startedAt:new Date().toISOString()};
  const s = STORY?.meta?.start||Object.keys(STORY.entries)[0]||'start';
  STATE.currentEntry=s; saveState(); renderEntry(s);
  showToast('Reiniciada');
}
function exportData() {
  const obj = {meta:STORY?STORY.meta:{},exported_at:new Date().toISOString(),state:STATE};
  const b = new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');a.href=u;a.download='historia_'+Date.now()+'.json';a.click();
  URL.revokeObjectURL(u);
  showToast('Envíame el archivo por WhatsApp 💌');
}
function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ==============================================================
   TIME MACHINE
   ============================================================== */
function openTimeMachine() {
  togglePanel();
  const tm = STORY?.meta?.timeMachine;
  if (!tm || !tm.password) {
    showToast('Time Machine no configurado');
    return;
  }
  document.getElementById('tm-screen').classList.add('active');
  document.getElementById('tm-pass-view').style.display = 'flex';
  document.getElementById('tm-pass-view').style.flexDirection = 'column';
  document.getElementById('tm-pass-view').style.alignItems = 'center';
  document.getElementById('tm-chapters-view').style.display = 'none';
  document.getElementById('tm-pass-input').value = '';
  document.getElementById('tm-error').style.display = 'none';
}

function checkTMPass() {
  const input = document.getElementById('tm-pass-input').value;
  const tm = STORY.meta.timeMachine;
  if (input === tm.password) {
    document.getElementById('tm-pass-view').style.display = 'none';
    document.getElementById('tm-chapters-view').style.display = 'flex';
    document.getElementById('tm-chapters-view').style.flexDirection = 'column';
    document.getElementById('tm-chapters-view').style.alignItems = 'center';
    // Show available chapters
    const list = document.getElementById('tm-ch-list');
    list.innerHTML = (tm.chapters || []).map(ch => {
      // Find root entry of this chapter
      const rootId = Object.keys(STORY.entries).find(id => STORY.entries[id].chapter === ch);
      const name = rootId && STORY.entries[rootId].displayName ? STORY.entries[rootId].displayName : ch;
      return rootId ? `<button class="tm-ch-btn" onclick="jumpToChapter('${rootId}')">${name}</button>` : '';
    }).join('');
    if (!list.innerHTML) list.innerHTML = '<p style="opacity:0.4;">No hay capítulos configurados</p>';
  } else {
    document.getElementById('tm-error').style.display = 'block';
  }
}

function jumpToChapter(entryId) {
  closeTM();
  renderEntry(entryId);
}

function closeTM() {
  document.getElementById('tm-screen').classList.remove('active');
}

init();
</script>
</body>
</html>
