<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab — Constructor de Árbol</title>
<style>
:root {
  --bg:#111; --panel:#1a1a1a; --border:#2a2a2a; --text:#ddd;
  --accent:#e0c97f; --danger:#e07f7f; --success:#7fe07f;
  --font:'Arial Black',Arial,sans-serif; --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:12px;text-transform:uppercase;}
#app{display:flex;height:100vh;}

/* LEFT */
#left{width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#ltop{padding:8px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;}
#ltop button{flex:1;padding:7px 2px;font-size:9px;background:var(--border);color:var(--text);border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--font);text-transform:uppercase;min-width:45px;}
#ltop button:hover{background:var(--accent);color:#111;}
#start-display{padding:5px 8px;border-bottom:1px solid var(--border);font-size:9px;color:var(--accent);min-height:24px;}
#tree{flex:1;overflow-y:auto;padding:6px;}
#sbar{padding:4px 8px;border-top:1px solid var(--border);font-size:8px;opacity:0.4;text-align:center;}

.tn{margin:1px 0;}
.tn-row{padding:5px 6px;border-radius:4px;cursor:pointer;font-size:10px;display:flex;align-items:center;gap:3px;transition:background 0.12s;white-space:nowrap;overflow:hidden;}
.tn-row:hover{background:rgba(255,255,255,0.06);}
.tn-row.sel{background:var(--accent);color:#111;}
.tn-row .arr{font-size:7px;width:12px;text-align:center;flex-shrink:0;cursor:pointer;transition:transform 0.15s;display:inline-block;}
.tn-row .arr.open{transform:rotate(90deg);}
.tn-row .arr.leaf{opacity:0.15;cursor:default;}
.tn-row .ico{font-size:9px;flex-shrink:0;}
.tn-row .tag{font-size:7px;opacity:0.4;margin-left:auto;flex-shrink:0;}
.tn-row .dname{overflow:hidden;text-overflow:ellipsis;}
.tn-row .tid{font-size:7px;opacity:0.3;margin-left:3px;}
.tn-kids{margin-left:14px;border-left:1px solid rgba(255,255,255,0.05);}
.ch-hd{padding:7px 8px;background:rgba(224,201,127,0.08);border-radius:5px;cursor:pointer;font-size:10px;display:flex;align-items:center;gap:5px;user-select:none;margin-bottom:2px;}
.ch-hd:hover{background:rgba(224,201,127,0.15);}

/* CENTER */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.tab{padding:11px 16px;cursor:pointer;font-size:10px;letter-spacing:1px;border-bottom:2px solid transparent;}
.tab:hover{background:rgba(255,255,255,0.04);}
.tab.on{border-bottom-color:var(--accent);color:var(--accent);}
.tp{display:none;flex:1;overflow-y:auto;padding:16px;}
.tp.on{display:block;}

.fg{margin-bottom:10px;}
.fg label{display:block;font-size:9px;color:var(--accent);margin-bottom:4px;letter-spacing:1px;}
.fg input,.fg textarea,.fg select{width:100%;padding:7px;background:var(--border);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:11px;}
.fg textarea{min-height:70px;resize:vertical;text-transform:none;}
.fr{display:flex;gap:8px;}
.fr .fg{flex:1;}
.btn{padding:8px 14px;border:none;border-radius:var(--radius);font-family:var(--font);font-size:9px;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
.btn:hover{opacity:0.85;}
.bp{background:var(--accent);color:#111;}
.bs{background:var(--border);color:var(--text);}

#pvf{width:240px;height:400px;background:#0a0a0a;border-radius:18px;border:2px solid var(--border);margin:10px auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;text-align:center;overflow:hidden;flex-shrink:0;position:relative;}
#pvc{flex:1;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;position:relative;}
#pvb{display:flex;gap:5px;padding:6px 0;flex-wrap:wrap;justify-content:center;}

.cr{display:flex;gap:5px;align-items:flex-end;margin-bottom:6px;padding:6px 8px;background:rgba(255,255,255,0.02);border-radius:5px;flex-wrap:wrap;}
.cr .fg{margin-bottom:0;}

#bread{padding:6px 10px;border-bottom:1px solid var(--border);font-size:9px;color:var(--accent);min-height:26px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
#bread span{cursor:pointer;opacity:0.6;}
#bread span:hover{opacity:1;}
#bread span.cur{opacity:1;color:var(--text);cursor:default;}

#ro{background:var(--border);border-radius:var(--radius);padding:14px;font-size:11px;line-height:1.8;text-transform:none;white-space:pre-wrap;max-height:60vh;overflow-y:auto;}
#rd{border:2px dashed rgba(255,255,255,0.12);border-radius:var(--radius);padding:36px;text-align:center;margin-bottom:14px;cursor:pointer;}
#rd:hover{border-color:var(--accent);}
.ds{background:rgba(255,255,255,0.03);border-radius:var(--radius);padding:14px;}

/* Image list in editor */
.img-slot{display:inline-block;position:relative;margin:4px;border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;}
.img-slot img{width:80px;height:80px;object-fit:cover;display:block;}
.img-slot .x-btn{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Checkbox style */
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.chk-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);}
.chk-row label{font-size:9px;color:var(--accent);margin:0;}
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="ltop">
      <button onclick="newRoot()">+ Entrada</button>
      <button onclick="newChapter()">+ Cap</button>
      <button onclick="doPull()">↓ Pull</button>
      <button onclick="delEntry()">🗑</button>
    </div>
    <div id="start-display">🟢 Inicio: <span id="start-name">—</span></div>
    <div id="tree"></div>
    <div id="sbar">—</div>
  </div>
  <div id="center">
    <div id="tabs">
      <div class="tab on" data-t="ed" onclick="swTab('ed')">Editor</div>
      <div class="tab" data-t="re" onclick="swTab('re')">Leer Export</div>
      <div class="tab" data-t="gh" onclick="swTab('gh')">GitHub</div>
      <div class="tab" data-t="tm" onclick="swTab('tm')">Time Machine</div>
    </div>

    <!-- EDITOR -->
    <div class="tp on" id="tp-ed">
      <div id="bread"></div>
      <div class="fr" style="margin-top:8px;">
        <div class="fg" style="max-width:150px"><label>Tipo</label><select id="sel-type" onchange="selType(this.value)"></select></div>
        <div class="fg" style="max-width:150px"><label>Capítulo</label><select id="sel-ch"></select></div>
        <div class="fg" style="max-width:180px"><label>ID <span style="opacity:0.3;font-size:7px;">(interno, auto)</span></label><input type="text" id="f-id" style="opacity:0.5;" readonly></div>
      </div>
      <div class="fr">
        <div class="fg"><label>Nombre visible <span style="opacity:0.3;font-size:7px;">(doble-click en árbol para editar)</span></label><input type="text" id="f-dname" placeholder="Nombre para mostrar en el árbol"></div>
      </div>
      <div class="chk-row">
        <input type="checkbox" id="f-isstart"><label for="f-isstart">Es el inicio de la historia</label>
      </div>
      <div id="eform"></div>
      <div id="pvf"><div id="pvc"></div><div id="pvb"></div></div>
      <div id="ced">
        <div class="fr">
          <div class="fg" style="max-width:110px"><label>Nº opciones</label><input type="number" id="nch" min="0" max="8" value="2" onchange="buildCh()"></div>
          <div class="fg" style="max-width:85px"><label>Borde btn</label><input type="color" id="f-cb" value="#e0c97f" onchange="pv()"></div>
          <div class="fg" style="max-width:85px"><label>Texto btn</label><input type="color" id="f-ct" value="#e0c97f" onchange="pv()"></div>
        </div>
        <div id="chf"></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
        <button class="btn bp" onclick="saveEntry()">Guardar</button>
        <button class="btn bs" onclick="pv()">Preview</button>
        <button class="btn bs" onclick="duplicateEntry()">📋 Duplicar</button>
        <button class="btn bs" onclick="dlStory()">↓ JSON</button>
      </div>
    </div>

    <!-- READER -->
    <div class="tp" id="tp-re">
      <h3 style="color:var(--accent);margin-bottom:14px;">Lector</h3>
      <div id="rd" onclick="document.getElementById('rf').click()">Click o arrastra JSON</div>
      <input type="file" id="rf" accept=".json" style="display:none" onchange="readExp(event)">
      <div id="ro"></div>
    </div>

    <!-- GITHUB -->
    <div class="tp" id="tp-gh">
      <h3 style="color:var(--accent);margin-bottom:14px;">GitHub</h3>
      <div class="ds">
        <div class="fg"><label>Token</label><input type="password" id="gh-t" onchange="saveGH()"></div>
        <div class="fg"><label>Repo (user/repo)</label><input type="text" id="gh-r" onchange="saveGH()"></div>
        <div class="fg"><label>Rama</label><input type="text" id="gh-b" value="main" onchange="saveGH()"></div>
        <div class="fg"><label>Ruta story.json</label><input type="text" id="gh-p" value="story.json" onchange="saveGH()"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn bp" onclick="doPush()">↑ Push story</button>
          <button class="btn bs" onclick="doPull()">↓ Pull story</button>
        </div>
        <p id="gh-st" style="margin-top:8px;font-size:10px;opacity:0.7;"></p>
      </div>
    </div>

    <!-- TIME MACHINE CONFIG -->
    <div class="tp" id="tp-tm">
      <h3 style="color:var(--accent);margin-bottom:14px;">Time Machine</h3>
      <p style="font-size:9px;opacity:0.5;margin-bottom:12px;">Configura los capítulos accesibles y la contraseña para la web.</p>
      <div class="fg"><label>Contraseña</label><input type="text" id="tm-pass" value="" onchange="saveTM()" placeholder="Contraseña para acceder"></div>
      <div class="fg"><label>Capítulos accesibles (marca los visibles)</label>
        <div id="tm-chapters"></div>
      </div>
      <button class="btn bp" onclick="saveTM()">Guardar Time Machine</button>
    </div>
  </div>
</div>

<script>
/* ==============================================================
   STORY
   ============================================================== */
let story={meta:{title:"Mi Historia",version:1,start:"",timeMachine:{password:"",chapters:[]}},chapters:["cap1"],entries:{}};
let cur=null, selT='text', expanded=new Set();

function save(){localStorage.setItem('lab_story',JSON.stringify(story));}
function ld(){
  const s=localStorage.getItem('lab_story');
  if(s)try{story=JSON.parse(s);}catch(e){}
  if(!story.entries)story.entries={};
  if(!story.chapters||!story.chapters.length)story.chapters=xCh();
  if(!story.meta)story.meta={};
  if(!story.meta.timeMachine)story.meta.timeMachine={password:'',chapters:[]};
}
function xCh(){const c=new Set();Object.values(story.entries||{}).forEach(e=>{if(e.chapter)c.add(e.chapter);});return c.size?[...c]:['cap1'];}
function saveGH(){localStorage.setItem('gh_cfg',JSON.stringify({t:gv('gh-t'),r:gv('gh-r'),b:gv('gh-b'),p:gv('gh-p')}));}
function ldGH(){const s=localStorage.getItem('gh_cfg');if(!s)return;try{const c=JSON.parse(s);gi('gh-t').value=c.t||'';gi('gh-r').value=c.r||'';gi('gh-b').value=c.b||'main';if(c.p)gi('gh-p').value=c.p;}catch(e){}}

/* ==============================================================
   TEMPLATES
   ============================================================== */
const TPL={};

TPL.text={
  label:'Texto',icon:'📝',
  form(){
    const d=cd();
    return `<div class="fg"><label>Texto</label><textarea id="f-text" oninput="pv()">${esc(d.text||'')}</textarea></div>
    <div class="fr"><div class="fg"><label>Fondo</label><input type="color" id="f-bg" value="${d.bg||'#0a0a0a'}" onchange="pv()"></div>
    <div class="fg"><label>Color</label><input type="color" id="f-color" value="${d.color||'#f0f0f0'}" onchange="pv()"></div>
    <div class="fg"><label>Size</label><input type="text" id="f-size" value="${d.size||'22px'}" onchange="pv()"></div></div>`;
  },
  data(){return{text:gv('f-text'),bg:gv('f-bg')||'#0a0a0a',color:gv('f-color')||'#f0f0f0',size:gv('f-size')||'22px'};},
  pv(d){return `<div style="color:${d.color};font-size:${d.size};font-family:Arial Black,sans-serif;text-transform:uppercase;line-height:1.3;padding:6px;">${esc(d.text||'...')}</div>`;}
};



TPL.image={
  label:'Imagen',icon:'🖼',
  form(){
    const d=cd();
    let imgsHTML='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">';
    _tmpImages.forEach((img,i)=>{
      const thumb=img.preview||img.src||'';
      imgsHTML+=`<div style="border:1px solid var(--border);border-radius:6px;padding:4px;width:130px;">
        <img src="${thumb}" style="width:100%;height:65px;object-fit:cover;border-radius:4px;">
        <div style="font-size:7px;opacity:0.4;overflow:hidden;white-space:nowrap;margin:2px 0;">${esc(img.name||'')}</div>
        <div class="fr" style="gap:3px;margin-bottom:2px;">
          <div class="fg" style="margin-bottom:0;width:40px;"><label style="font-size:6px;">W%</label><input type="number" value="${img.w||100}" min="5" max="200" onchange="_tmpImages[${i}].w=+this.value;pv();" style="font-size:8px;padding:2px;"></div>
          <div class="fg" style="margin-bottom:0;width:40px;"><label style="font-size:6px;">Rot°</label><input type="number" value="${img.rot||0}" min="-180" max="180" onchange="_tmpImages[${i}].rot=+this.value;pv();" style="font-size:8px;padding:2px;"></div>
        </div>
        <div style="display:flex;gap:2px;align-items:center;">
          <label style="font-size:7px;color:var(--accent);margin:0;">Opción</label>
          <input type="checkbox" ${img.isChoice?'checked':''} onchange="_tmpImages[${i}].isChoice=this.checked;renderForm();pv();" style="width:11px;height:11px;">
          <button class="btn bs" onclick="_tmpImages.splice(${i},1);renderForm();pv()" style="padding:2px 5px;font-size:7px;margin-left:auto;">×</button>
        </div>
        ${img.isChoice?`<div class="fg" style="margin:3px 0 0;"><select style="font-size:7px;padding:2px;" onchange="_tmpImages[${i}].linkTo=this.value"><option value="">— auto —</option>${linkOptsHTML(img.linkTo||'')}</select></div>`:''}
      </div>`;
    });
    imgsHTML+='</div>';
    return `${imgsHTML}
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <button class="btn bs" type="button" onclick="gi('img-picker').click()">📂 Añadir imagen</button>
      <input type="file" id="img-picker" accept="image/*" multiple style="display:none" onchange="pickImages(event)">
    </div>
    <div class="fr">
      <div class="fg"><label>Fondo</label><input type="color" id="f-bg" value="${d.bg||'#0a0a0a'}" onchange="pv()"></div>
    </div>
    <hr style="border-color:var(--border);margin:6px 0;">
    <p style="font-size:9px;color:var(--accent);margin-bottom:4px;">Bloques de texto</p>
    <div id="img-blocks-area"></div>
    <button class="btn bs" type="button" onclick="addBlock('ib')" style="margin-bottom:6px;">+ Texto</button>`;
  },
  data(){
    return {
      images:_tmpImages.map(im=>({src:im.ghPath||im.src,name:im.name,isChoice:im.isChoice||false,linkTo:im.linkTo||'',x:im.x,y:im.y,w:im.w,rot:im.rot})),
      bg:gv('f-bg')||'#0a0a0a',
      src:_tmpImages[0]?.ghPath||_tmpImages[0]?.src||'',
      blocks:_imgBlocks
    };
  },
  pv(d){
    if(!_tmpImages.length)return '<div style="opacity:0.3;">📂 Añade imagen(es)</div>';
    let h=`<div id="pv-canvas" style="position:relative;width:100%;height:100%;" onmousedown="startDrag(event)" onmousemove="doDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">`;
    _tmpImages.forEach((img,i)=>{
      const src=img.preview||img.src||'';
      const w=img.w||100;
      const rot=img.rot||0;
      const x=img.x!=null?img.x:50;
      const y=img.y!=null?img.y:50;
      // No border-radius by default, no outline unless user sets it
      h+=`<img class="pv-el" data-type="img" data-idx="${i}" src="${src}" style="position:absolute;left:${x}%;top:${y}%;width:${w}%;transform:translate(-50%,-50%) rotate(${rot}deg);cursor:move;">`;
    });
    (_imgBlocks||[]).forEach((b,i)=>{
      const fs=b.style==='italic'?'font-style:italic;':'';
      const fw=b.style==='bold'?'font-weight:900;':'font-weight:normal;';
      const shadow=b.shadow?'text-shadow:0 2px 6px rgba(0,0,0,0.8);':'';
      const rot=b.rot?`rotate(${b.rot}deg)`:'';
      const border=b.isChoice&&b.choiceBorder?`outline:1px solid ${b.choiceBorder};padding:3px 8px;border-radius:4px;`:'';
      h+=`<div class="pv-el" data-type="block" data-idx="${i}" style="position:absolute;left:${b.x||50}%;top:${b.y||80}%;transform:translate(-50%,-50%) ${rot};color:${b.color||'#fff'};font-size:${b.size||'14px'};${fs}${fw}${shadow}font-family:'${esc(b.font||'Arial Black')}',sans-serif;cursor:move;user-select:none;max-width:80%;text-align:center;${border}">${esc(b.text||'')}</div>`;
    });
    h+='</div>';return h;
  }
};

TPL.richtext={
  label:'Texto Enriquecido',icon:'🎨',
  form(){
    const d=cd();
    return `<div class="fg"><label>Fondo</label><input type="color" id="f-bg" value="${d.bg||'#0a0a0a'}" onchange="pv()"></div>
    <p style="font-size:9px;color:var(--accent);margin-bottom:4px;">Bloques de texto</p>
    <div id="rt-blocks-area"></div>
    <button class="btn bs" type="button" onclick="addBlock('rb')" style="margin-bottom:6px;">+ Texto</button>
    <hr style="border-color:var(--border);margin:6px 0;">
    <p style="font-size:9px;color:var(--accent);margin-bottom:4px;">Fuentes</p>
    <div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;">
      <button class="btn bs" type="button" onclick="gi('font-picker').click()">📂 Archivo</button>
      <button class="btn bs" type="button" onclick="loadFontFolder()">📁 Carpeta</button>
      <input type="file" id="font-picker" accept=".ttf,.otf,.woff,.woff2" multiple style="display:none" onchange="loadFonts(event)">
    </div>
    <div style="font-size:8px;opacity:0.5;">${_customFonts.map(f=>'✓ '+f.name).join(', ')||'Sin fuentes custom'}</div>`;
  },
  data(){ return {bg:gv('f-bg')||'#0a0a0a',blocks:_rtBlocks,fonts:_customFonts.map(f=>({name:f.name,ghPath:f.ghPath,_b64:f._b64}))}; },
  pv(d){
    let h=`<div id="pv-canvas" style="position:relative;width:100%;height:100%;" onmousedown="startDrag(event)" onmousemove="doDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">`;
    (_rtBlocks||[]).forEach((b,i)=>{
      const fs=b.style==='italic'?'font-style:italic;':'';
      const fw=b.style==='bold'?'font-weight:900;':'font-weight:normal;';
      const shadow=b.shadow?'text-shadow:0 1px 4px rgba(0,0,0,0.6);':'';
      const tt=b.uppercase?'text-transform:uppercase;':'text-transform:none;';
      const rot=b.rot?`rotate(${b.rot}deg)`:'';
      const border=b.isChoice&&b.choiceBorder?`outline:1px solid ${b.choiceBorder};padding:3px 8px;border-radius:4px;`:'';      h+=`<div class="pv-el" data-type="rtblock" data-idx="${i}" style="position:absolute;left:${b.x||50}%;top:${b.y||50}%;transform:translate(-50%,-50%) ${rot};color:${b.color||'#f0f0f0'};font-size:${b.size||'22px'};${fs}${fw}${shadow}${tt}font-family:'${esc(b.font||'Arial Black')}',sans-serif;cursor:move;user-select:none;max-width:90%;text-align:center;${border}">${esc(b.text||'Texto')}</div>`;
    });
    h+='</div>';return h;
  }
};

TPL.html={
  label:'HTML/Anim',icon:'✨',
  form(){const d=cd();return `<div class="fg"><label>HTML</label><textarea id="f-content" style="min-height:110px;font-family:monospace;text-transform:none;" oninput="pv()">${esc(d.content||'')}</textarea></div><div class="fg"><label>Fondo</label><input type="color" id="f-bg" value="${d.bg||'#0a0a0a'}" onchange="pv()"></div>`;},
  data(){return{content:gv('f-content'),bg:gv('f-bg')||'#0a0a0a'};},
  pv(d){return d.content||'<div style="opacity:0.3;">vacío</div>';}
};

/* ==============================================================
   STATE: images, blocks, fonts
   ============================================================== */
let _tmpImages=[], _imgBlocks=[], _rtBlocks=[], _customFonts=[];

// Load saved custom fonts and inject them
(function(){
  const s=localStorage.getItem('lab_fonts');
  if(s)try{
    _customFonts=JSON.parse(s);
    _customFonts.forEach(f=>{
      if(f.dataUrl)injectFont(f.name,f.dataUrl);
    });
  }catch(e){}
})();

function injectFont(name,dataUrl){
  const st=document.createElement('style');
  st.textContent=`@font-face{font-family:'${name}';src:url('${dataUrl}');}`;
  document.head.appendChild(st);
}

function loadFonts(ev){
  const files=ev.target.files;if(!files.length)return;
  let p=files.length;
  for(const file of files){
    const name=file.name.replace(/\.[^.]+$/,'');
    if(_customFonts.find(f=>f.name===name)){p--;if(p<=0){renderForm();pv();}continue;}
    const r=new FileReader();
    r.onload=function(e){
      const dataUrl=e.target.result;
      injectFont(name,dataUrl);
      _customFonts.push({name,dataUrl,ghPath:'fonts/'+file.name,_b64:dataUrl.split(',')[1]});
      localStorage.setItem('lab_fonts',JSON.stringify(_customFonts));
      p--;if(p<=0){renderForm();pv();}
    };
    r.readAsDataURL(file);
  }
  ev.target.value='';
}

async function loadFontFolder(){
  // Use File System Access API to pick a folder
  if(!window.showDirectoryPicker){
    alert('Tu navegador no soporta acceso a carpetas. Usa Chrome o Edge.\nAlternativa: usa el botón "Archivo" para seleccionar fuentes una a una.');
    return;
  }
  try{
    const dirHandle=await window.showDirectoryPicker({mode:'read'});
    let count=0;
    for await(const entry of dirHandle.values()){
      if(entry.kind!=='file')continue;
      const name=entry.name.toLowerCase();
      if(!name.endsWith('.ttf')&&!name.endsWith('.otf')&&!name.endsWith('.woff')&&!name.endsWith('.woff2'))continue;
      const fontName=entry.name.replace(/\.[^.]+$/,'');
      if(_customFonts.find(f=>f.name===fontName))continue;
      const file=await entry.getFile();
      const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
      injectFont(fontName,dataUrl);
      _customFonts.push({name:fontName,dataUrl,ghPath:'fonts/'+entry.name,_b64:dataUrl.split(',')[1]});
      count++;
    }
    localStorage.setItem('lab_fonts',JSON.stringify(_customFonts));
    renderForm();pv();
    if(count)alert('✓ '+count+' fuentes cargadas');
    else alert('No se encontraron fuentes nuevas en esa carpeta');
  }catch(e){
    if(e.name!=='AbortError')alert('Error: '+e.message);
  }
}

/* ==============================================================
   DRAG in preview — all elements movable
   ============================================================== */
let _dEl=null,_dT='',_dI=-1,_dSX=0,_dSY=0,_dSL=0,_dST=0;
function startDrag(ev){
  const el=ev.target.closest('.pv-el');if(!el)return;ev.preventDefault();
  _dEl=el;_dT=el.dataset.type;_dI=parseInt(el.dataset.idx);
  _dSX=ev.clientX;_dSY=ev.clientY;
  if(_dT==='img'){_dSL=_tmpImages[_dI]?.x||50;_dST=_tmpImages[_dI]?.y||50;}
  else if(_dT==='block'){_dSL=_imgBlocks[_dI]?.x||50;_dST=_imgBlocks[_dI]?.y||50;}
  else if(_dT==='rtblock'){_dSL=_rtBlocks[_dI]?.x||50;_dST=_rtBlocks[_dI]?.y||50;}
}
function doDrag(ev){
  if(!_dEl)return;ev.preventDefault();
  const c=gi('pv-canvas');if(!c)return;const r=c.getBoundingClientRect();
  const dx=((ev.clientX-_dSX)/r.width)*100,dy=((ev.clientY-_dSY)/r.height)*100;
  const nx=Math.max(0,Math.min(100,_dSL+dx)),ny=Math.max(0,Math.min(100,_dST+dy));
  if(_dT==='img'){_tmpImages[_dI].x=nx;_tmpImages[_dI].y=ny;_dEl.style.left=nx+'%';_dEl.style.top=ny+'%';}
  else if(_dT==='block'){_imgBlocks[_dI].x=nx;_imgBlocks[_dI].y=ny;_dEl.style.left=nx+'%';_dEl.style.top=ny+'%';}
  else if(_dT==='rtblock'){_rtBlocks[_dI].x=nx;_rtBlocks[_dI].y=ny;_dEl.style.left=nx+'%';_dEl.style.top=ny+'%';}
}
function endDrag(){
  if(_dEl&&_dT==='block'&&gi(`ibx-${_dI}`)){gi(`ibx-${_dI}`).value=Math.round(_imgBlocks[_dI].x);gi(`ibyp-${_dI}`).value=Math.round(_imgBlocks[_dI].y);}
  if(_dEl&&_dT==='rtblock'&&gi(`rbx-${_dI}`)){gi(`rbx-${_dI}`).value=Math.round(_rtBlocks[_dI].x);gi(`rbyp-${_dI}`).value=Math.round(_rtBlocks[_dI].y);}
  _dEl=null;_dT='';_dI=-1;
}


/* ==============================================================

function gv(id){return document.getElementById(id)?.value||'';}
function gi(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cd(){return(cur&&story.entries[cur]?.data)||{};}
function autoId(parentId,i){return parentId+'_'+(i+1);}

function getPath(id){
  const path=[id];let safe=50;
  while(safe-->0){
    const cid=path[0];let found=false;
    for(const[pid,pe]of Object.entries(story.entries)){
      if(pe.choices&&pe.choices.some(c=>c.next===cid)){path.unshift(pid);found=true;break;}
    }
    if(!found)break;
  }
  return path;
}

function dn(id){return story.entries[id]?.displayName||id;} // get display name

/* Build cascading link selector HTML for choices */
function linkSelectorHTML(i, currentNext){
  // Group entries by chapter
  let opts='<option value="">— auto (nuevo hijo) —</option>';
  (story.chapters||[]).forEach(ch=>{
    const inCh=Object.keys(story.entries).filter(id=>story.entries[id].chapter===ch);
    if(!inCh.length)return;
    opts+=`<optgroup label="📖 ${esc(ch)}">`;
    inCh.forEach(id=>{
      const name=dn(id);
      opts+=`<option value="${esc(id)}" ${id===currentNext?'selected':''}>${esc(name)} <small>(${esc(id)})</small></option>`;
    });
    opts+='</optgroup>';
  });
  return opts;
}

/* ==============================================================
   SAVE — auto-creates children, handles links
   ============================================================== */
function saveEntry(){
  const t=TPL[selT];if(!t)return;
  let id=cur;
  if(!id){
    const ch=gv('sel-ch')||story.chapters[0]||'cap1';
    const n=Object.keys(story.entries).filter(eid=>story.entries[eid].chapter===ch&&!getPath(eid).slice(0,-1).some(p=>story.entries[p]?.chapter===ch)).length;
    id=ch+'_'+(n+1);
    // Ensure unique
    while(story.entries[id])id+='_1';
  }

  const data=t.data();
  const chapter=gv('sel-ch')||story.chapters[0]||'cap1';
  const choiceBorder=gv('f-cb')||'#e0c97f';
  const choiceColor=gv('f-ct')||'#e0c97f';
  const displayName=gv('f-dname')||'';
  const n=parseInt(gv('nch'))||0;

  // Handle start checkbox
  if(gi('f-isstart').checked) story.meta.start=id;

  const existingChoices=story.entries[id]?.choices||[];
  const choices=[];

  for(let i=0;i<n;i++){
    const label=gi(`cl-${i}`)?.value||`Opción ${i+1}`;
    const isLink=gi(`lk-${i}`)?.checked||false;

    let next;
    if(isLink){
      // Link transversal: use selected entry
      next=gi(`ln-${i}`)?.value||'';
      if(next) choices.push({label,next,_link:true});
      else choices.push({label,next:'',_link:true});
    } else {
      // Auto-create child
      next=existingChoices[i]?.next||'';
      if(!next||existingChoices[i]?._link){
        next=autoId(id,i);
        let att=next,c=1;
        while(story.entries[att]&&!story.entries[att]._placeholder){att=next+'_'+(++c);}
        next=att;
      }
      choices.push({label,next});
      // Create placeholder if doesn't exist
      if(!story.entries[next]){
        story.entries[next]={
          type:'text',chapter,
          data:{text:'',bg:'#0a0a0a',color:'#f0f0f0',size:'22px'},
          choices:[],choiceBorder,choiceColor,_placeholder:true
        };
      }
    }
  }

  const entry={type:selT,chapter,data,choices,choiceBorder,choiceColor};
  if(displayName)entry.displayName=displayName;
  story.entries[id]=entry;

  if(!story.chapters.includes(chapter))story.chapters.push(chapter);
  if(!story.meta.start)story.meta.start=id;

  expanded.add(id);
  cur=id;
  save();renderAll();
}

/* ==============================================================
   DUPLICATE ENTRY
   ============================================================== */
function duplicateEntry(){
  if(!cur||!story.entries[cur])return;
  const src=JSON.parse(JSON.stringify(story.entries[cur]));
  // Generate new ID
  let newId=cur+'_copy';
  let c=1;while(story.entries[newId]){newId=cur+'_copy'+(++c);}
  // Clear choices targets (they'll be auto-created on save)
  src.choices=(src.choices||[]).map(ch=>({label:ch.label,next:''}));
  delete src._placeholder;
  src.displayName=(src.displayName||cur)+' (copia)';
  story.entries[newId]=src;
  cur=newId;
  save();renderAll();
  clickNode(newId);
}

/* ==============================================================
   LOAD / NEW / DELETE
   ============================================================== */
function clickNode(id){
  cur=id;const e=story.entries[id];if(!e)return;
  selT=e.type||'text';expanded.add(id);
  // Load temp state for image/richtext
  if(selT==='image'){
    _tmpImages=e.data?.images||[];
    if(!_tmpImages.length&&e.data?.src)_tmpImages=[{src:e.data.src,preview:e.data.src,name:'img'}];
    _imgBlocks=e.data?.blocks||[];
  } else if(selT==='richtext'){
    _rtBlocks=e.data?.blocks||[];
  }
  renderSel();renderForm();
  if(e.choiceBorder)gi('f-cb').value=e.choiceBorder;
  if(e.choiceColor)gi('f-ct').value=e.choiceColor;
  if(e.choices){gi('nch').value=e.choices.length;buildCh();}
  pv();renderTree();renderBread();
}

function newRoot(){cur=null;selT='text';_tmpImages=[];renderSel();renderForm();gi('nch').value=2;buildCh();pv();renderBread();}

function delEntry(){
  if(!cur)return;
  if(!confirm('¿Eliminar "'+dn(cur)+'" y sus hijos?'))return;
  const oldCur=cur;
  delR(cur);
  for(const[,pe]of Object.entries(story.entries)){if(pe.choices)pe.choices=pe.choices.filter(c=>c.next!==oldCur);}
  cur=null;save();renderAll();newRoot();
}
function delR(id){
  const e=story.entries[id];if(!e)return;
  if(e.choices)e.choices.forEach(c=>{if(c.next&&!c._link)delR(c.next);});
  delete story.entries[id];expanded.delete(id);
}

/* ==============================================================
   TREE — with displayName, double-click rename, start indicator
   ============================================================== */
function renderTree(){
  const box=gi('tree');const entries=story.entries;const ids=Object.keys(entries);
  if(!ids.length){box.innerHTML='<div style="opacity:0.3;padding:10px;text-align:center;">Vacío</div>';updS();return;}

  const byCh={};
  ids.forEach(id=>{const ch=entries[id].chapter||'sin_cap';if(!byCh[ch])byCh[ch]=[];byCh[ch].push(id);});
  const allCh=[...(story.chapters||[])];
  Object.keys(byCh).forEach(ch=>{if(!allCh.includes(ch))allCh.push(ch);});

  let html='';
  allCh.forEach(ch=>{
    const eids=byCh[ch];if(!eids||!eids.length)return;
    const targeted=new Set();
    eids.forEach(id=>{(entries[id].choices||[]).forEach(c=>{if(c.next&&entries[c.next])targeted.add(c.next);});});
    const roots=eids.filter(id=>!targeted.has(id));
    const show=roots.length?roots:eids;

    html+=`<div class="ch-hd" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">📖 ${esc(ch)} (${eids.length})</div><div class="ch-body">`;
    show.forEach(id=>{html+=nHTML(id,new Set());});
    html+='</div>';
  });
  box.innerHTML=html;updS();
}

function nHTML(id,vis){
  if(vis.has(id)||!story.entries[id])return'';
  vis.add(id);
  const e=story.entries[id];const icon=TPL[e.type]?.icon||'?';
  const isSel=id===cur;
  const kids=(e.choices||[]).filter(c=>c.next&&story.entries[c.next]);
  const hasK=kids.length>0;const isExp=expanded.has(id);
  const isPH=e._placeholder;
  const name=e.displayName||id;
  const isStart=story.meta.start===id;
  const startBadge=isStart?'🟢 ':'';
  const phBadge=isPH?' ⬜':'';
  const linkBadge=e.choices?.some(c=>c._link)?' 🔗':'';

  let h=`<div class="tn"><div class="tn-row ${isSel?'sel':''}" onclick="clickNode('${esc(id)}')" ondblclick="event.stopPropagation();dblRename('${esc(id)}')">`;
  if(hasK)h+=`<span class="arr ${isExp?'open':''}" onclick="event.stopPropagation();togExp('${esc(id)}')">▶</span>`;
  else h+=`<span class="arr leaf">·</span>`;
  h+=`<span class="ico">${icon}</span>`;
  h+=`<span class="dname">${startBadge}${esc(name)}${phBadge}${linkBadge}</span>`;
  if(e.displayName)h+=`<span class="tid">${esc(id)}</span>`;
  if(hasK)h+=`<span class="tag">${kids.length}</span>`;
  h+='</div>';
  if(hasK&&isExp){h+='<div class="tn-kids">';kids.forEach(c=>{h+=nHTML(c.next,new Set(vis));});h+='</div>';}
  h+='</div>';return h;
}

function dblRename(id){
  const e=story.entries[id];if(!e)return;
  const newName=prompt('Nombre visible para "'+id+'":', e.displayName||id);
  if(newName===null)return;
  e.displayName=newName.trim()||'';
  save();renderTree();renderBread();
  if(cur===id)gi('f-dname').value=e.displayName;
}

function togExp(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);renderTree();}
function updS(){gi('sbar').textContent=Object.keys(story.entries).length+' entradas · '+(story.chapters||[]).length+' caps';}

/* ==============================================================
   TIME MACHINE CONFIG
   ============================================================== */
function renderTM(){
  const tm=story.meta.timeMachine||{password:'',chapters:[]};
  gi('tm-pass').value=tm.password||'';
  const container=gi('tm-chapters');
  container.innerHTML=(story.chapters||[]).map(ch=>{
    const checked=tm.chapters.includes(ch)?'checked':'';
    // Find root entry of this chapter for linking
    const rootId=Object.keys(story.entries).find(id=>story.entries[id].chapter===ch);
    return `<div class="chk-row"><input type="checkbox" id="tmc-${esc(ch)}" ${checked}><label for="tmc-${esc(ch)}">${esc(ch)} ${rootId?'(→ '+esc(dn(rootId))+')':''}</label></div>`;
  }).join('');
}

function saveTM(){
  const pass=gv('tm-pass');
  const chapters=[];
  (story.chapters||[]).forEach(ch=>{
    if(gi('tmc-'+ch)?.checked)chapters.push(ch);
  });
  story.meta.timeMachine={password:pass,chapters};
  save();
  alert('✓ Time Machine guardado');
}

/* ==============================================================
   TABS
   ============================================================== */
function swTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tp').forEach(t=>t.classList.remove('on'));
  document.querySelector(`.tab[data-t="${id}"]`).classList.add('on');
  gi('tp-'+id).classList.add('on');
  if(id==='tm')renderTM();
}

/* ==============================================================
   READER
   ============================================================== */
function readExp(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{gi('ro').textContent=fmtExp(JSON.parse(e.target.result));}catch(err){gi('ro').textContent='Error: '+err.message;}};
  r.readAsText(f);
}
function fmtExp(d){
  let r=`═══ REPORTE ═══\nTítulo: ${d.meta?.title||'?'}\n\n── DECISIONES ──\n`;
  if(d.state?.history?.length){let lc='';d.state.history.forEach((h,i)=>{const ch=h.chapter||'?';if(ch!==lc){r+=`\n  📖 ${ch.toUpperCase()}\n`;lc=ch;}r+=`  ${i+1}. "${h.from}" → "${h.chose}" → "${h.next}"\n`;});}
  else r+='  Sin decisiones.\n';
  r+=`\n── DIARIO ──\n`;
  if(d.state?.diary?.length){d.state.diary.forEach((e,i)=>{r+=`  ${i+1}. [${fdt(e.timestamp)}] "${e.text}"\n`;});}
  else r+='  Vacío.\n';
  r+=`\n── POSICIÓN ──\n  ${d.state?.currentEntry||'?'}\n`;return r;
}
function fdt(iso){if(!iso)return'?';const d=new Date(iso);return d.toLocaleDateString('es-ES');}

/* ==============================================================
   GITHUB
   ============================================================== */
function ghC(){return{t:gv('gh-t').trim(),r:gv('gh-r').trim(),b:gv('gh-b').trim()||'main',p:gv('gh-p').trim()||'story.json'};}

async function ghPut(path,content,msg){
  const c=ghC();
  const url=`https://api.github.com/repos/${c.r}/contents/${path}`;
  let sha=null;
  try{const ex=await fetch(url+`?ref=${c.b}`,{headers:{'Authorization':`token ${c.t}`}});if(ex.ok)sha=(await ex.json()).sha;}catch(e){}
  const body={message:msg||'update '+path,content,branch:c.b};if(sha)body.sha=sha;
  return fetch(url,{method:'PUT',headers:{'Authorization':`token ${c.t}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
}

async function doPush(){
  const c=ghC();if(!c.t||!c.r){ldGH();if(!ghC().t)return ghMsg('Falta token/repo','var(--danger)');}
  ghMsg('Subiendo...','');

  // First upload any pending images
  let imgCount=0;
  for(const[,e]of Object.entries(story.entries)){
    if(e.data?.images){
      for(const img of e.data.images){
        if(img._b64&&img.ghPath){
          try{
            await ghPut(img.ghPath,img._b64,'Upload '+img.name);
            img.src=img.ghPath; // switch to github path
            delete img._b64; delete img.preview; delete img._file;
            imgCount++;
          }catch(err){}
        }
      }
    }
  }
  if(imgCount>0) ghMsg(`${imgCount} imágenes subidas, subiendo story...`,'');

  // Upload pending fonts
  let fontCount=0;
  for(const f of _customFonts){
    if(f._b64&&f.ghPath){
      try{await ghPut(f.ghPath,f._b64,'Upload font '+f.name);fontCount++;}catch(err){}
    }
  }

  const clean=JSON.parse(JSON.stringify(story));
  Object.values(clean.entries).forEach(e=>{
    delete e._placeholder;
    // Clean image data for JSON
    if(e.data?.images){
      e.data.images=e.data.images.map(img=>({src:img.ghPath||img.src,name:img.name,isChoice:img.isChoice||false,linkTo:img.linkTo||'',x:img.x,y:img.y,w:img.w}));
    }
  });
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(clean,null,2))));
  try{
    const res=await ghPut(ghC().p,content,'Update story');
    if(res.ok)ghMsg('✓ Push OK · '+Object.keys(story.entries).length+' entradas'+(imgCount?' · '+imgCount+' imgs':''),'var(--success)');
    else{const e=await res.json();ghMsg('Error: '+(e.message||res.status),'var(--danger)');}
  }catch(e){ghMsg('Error: '+e.message,'var(--danger)');}
  save();
}

async function doPull(){
  let c=ghC();if(!c.t||!c.r){ldGH();c=ghC();}if(!c.t||!c.r){alert('Configura token y repo');return;}
  ghMsg('Descargando...','');
  try{
    const res=await fetch(`https://api.github.com/repos/${c.r}/contents/${c.p}?ref=${c.b}`,{headers:{'Authorization':`token ${c.t}`}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const raw=data.content.replace(/[\n\r\s]/g,'');
    const decoded=decodeURIComponent(escape(atob(raw)));
    const parsed=JSON.parse(decoded);
    if(!parsed.entries)throw new Error('JSON sin entries');
    story=parsed;
    if(!story.chapters)story.chapters=xCh();
    if(!story.meta)story.meta={};
    if(!story.meta.start)story.meta.start=Object.keys(story.entries)[0]||'';
    if(!story.meta.timeMachine)story.meta.timeMachine={password:'',chapters:[]};
    cur=null;save();renderAll();newRoot();
    ghMsg('✓ Pull: '+Object.keys(story.entries).length+' entradas','var(--success)');
  }catch(e){ghMsg('Error: '+e.message,'var(--danger)');}
}

function ghMsg(m,c){const el=gi('gh-st');el.textContent=m;el.style.color=c||'';}

function dlStory(){
  const clean=JSON.parse(JSON.stringify(story));
  Object.values(clean.entries).forEach(e=>delete e._placeholder);
  const b=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='story.json';a.click();URL.revokeObjectURL(u);
}

/* ==============================================================
   DRAG & DROP
   ============================================================== */
document.addEventListener('DOMContentLoaded',()=>{
  const t=gi('tree');
  t.addEventListener('dragover',e=>e.preventDefault());
  t.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{story=JSON.parse(ev.target.result);if(!story.chapters)story.chapters=xCh();save();renderAll();}catch(err){alert('Error: '+err.message);}};r.readAsText(f);
  });
});

/* ==============================================================
   RENDER ALL + INIT
   ============================================================== */
function renderAll(){renderSel();renderForm();renderTree();renderBread();pv();}

ld();ldGH();renderAll();
</script>
